<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記述式クイズ・特訓システム (オンライン対戦対応)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 4px; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .combo-anim { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-2 sm:p-4 selection:bg-amber-500 selection:text-slate-950">

<div class="bg-slate-900/90 border border-slate-800 rounded-3xl shadow-2xl max-w-4xl w-full p-4 sm:p-6 backdrop-blur-md relative overflow-y-auto custom-scrollbar max-h-[95vh]">
    <div class="absolute -top-40 -left-40 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-80 h-80 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div id="loading-overlay" class="absolute inset-0 bg-slate-950/80 z-50 flex flex-col items-center justify-center fade-in rounded-3xl">
        <i data-lucide="loader-2" class="w-12 h-12 text-amber-500 animate-spin mb-4"></i>
        <p class="text-slate-300 font-bold">システムに接続中...</p>
    </div>

    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4 relative z-10">
        <div class="flex items-center gap-2">
            <div class="bg-amber-500 text-slate-950 p-2 rounded-xl shadow-lg">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
            </div>
            <div>
                <span class="text-xs text-amber-500 font-bold tracking-wider uppercase block">Quiz Master</span>
                <h1 class="text-lg sm:text-xl font-black text-slate-100">記述式 特訓＆対戦アプリ</h1>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span id="player-name-display" class="hidden sm:inline-block text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-lg text-slate-300 mr-2 border border-slate-700"></span>
            <button onclick="toggleMute()" id="mute-btn" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700/60 transition-all text-slate-300">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div id="menu-screen" class="relative z-10 hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-gradient-to-r from-emerald-900/40 to-slate-800/40 border border-emerald-500/30 p-5 rounded-2xl flex flex-col">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="swords" class="w-6 h-6 text-emerald-400"></i>
                    <h2 class="text-emerald-400 font-black text-lg">オンライン対戦ルーム</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">あなたの名前</label>
                        <input type="text" id="player-name-input" placeholder="ゲスト" maxlength="8" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-emerald-500">
                    </div>
                    <div class="pt-2">
                        <button onclick="createRoom()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> 部屋を新しく作る
                        </button>
                    </div>
                    <div class="flex items-center gap-2 py-1">
                        <hr class="flex-1 border-slate-700"><span class="text-xs text-slate-500 font-bold">または</span><hr class="flex-1 border-slate-700">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="join-room-id" placeholder="ルームID" maxlength="5" class="w-full uppercase bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-emerald-500">
                        <button onclick="joinRoom()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold px-4 py-2.5 rounded-xl transition-all whitespace-nowrap">参加する</button>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50">
                    <h2 class="font-bold text-slate-200 flex items-center gap-1.5 text-sm mb-3"><i data-lucide="user" class="w-4 h-4 text-amber-500"></i> 一人プレイ設定</h2>
                    <div class="flex flex-wrap items-center gap-2">
                        <label class="flex items-center gap-2 cursor-pointer bg-slate-900 px-2.5 py-2 rounded-xl border border-slate-800 flex-1 justify-center">
                            <input type="checkbox" id="single-timer-toggle" class="rounded text-amber-500 focus:ring-amber-500 bg-slate-800 border-slate-700" checked>
                            <span class="text-[10px] font-bold text-slate-300">タイマー有</span>
                        </label>
                        <div class="flex items-center gap-1 bg-slate-900 px-2.5 py-2 rounded-xl border border-slate-800 flex-1 justify-center">
                            <span class="text-[10px] font-bold text-slate-400">1問:</span>
                            <input type="number" id="single-timer-sec" value="30" min="5" max="120" class="w-10 bg-transparent text-amber-400 font-bold outline-none text-center text-sm">
                            <span class="text-[10px] text-slate-400">秒</span>
                        </div>
                        <div class="flex items-center gap-1 bg-slate-900 px-2.5 py-2 rounded-xl border border-slate-800 flex-1 justify-center">
                            <span class="text-[10px] font-bold text-slate-400">出題:</span>
                            <input type="number" id="single-q-count" value="10" min="1" max="100" class="w-10 bg-transparent text-amber-400 font-bold outline-none text-center text-sm">
                            <span class="text-[10px] text-slate-400">問</span>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-sm font-bold text-slate-300 mb-2 flex items-center gap-2"><i data-lucide="book-open" class="w-4 h-4 text-amber-400"></i> 出題範囲を選んで開始</h2>
                    <div class="grid grid-cols-1 gap-2 max-h-[150px] overflow-y-auto pr-1 custom-scrollbar" id="modes-list">
                        </div>
                </div>
                <button onclick="startSingleQuiz(8)" class="w-full relative group overflow-hidden bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-black p-3.5 rounded-xl transition-all hover:shadow-xl flex justify-between items-center">
                    <span class="block text-sm font-black flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> 全範囲ランダム</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="hidden space-y-6 relative z-10 fade-in">
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
            <h2 class="text-xl font-black text-emerald-400 flex items-center gap-2"><i data-lucide="radio" class="w-6 h-6 animate-pulse"></i> 対戦ロビー</h2>
            <div class="bg-slate-900 border border-emerald-500/50 px-4 py-2 rounded-xl flex items-center gap-3">
                <span class="text-xs text-slate-400 font-bold">ルームID:</span>
                <span id="lobby-room-id" class="text-xl font-black text-emerald-400 tracking-widest font-mono">-----</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/40 rounded-2xl border border-slate-700/50 p-4">
                <h3 class="text-sm font-bold text-slate-300 mb-3 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> 参加者 (<span id="lobby-player-count">1</span>人)</h3>
                <ul id="lobby-players-list" class="space-y-2 max-h-[200px] overflow-y-auto custom-scrollbar">
                </ul>
            </div>

            <div class="bg-slate-800/40 rounded-2xl border border-slate-700/50 p-4 space-y-3 relative">
                <div id="lobby-guest-overlay" class="absolute inset-0 bg-slate-900/50 z-10 hidden flex items-center justify-center rounded-2xl backdrop-blur-sm">
                    <span class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold text-emerald-400 border border-emerald-500/30">ホストが設定中です...</span>
                </div>
                <h3 class="text-sm font-bold text-slate-300 mb-2 flex items-center gap-2"><i data-lucide="sliders" class="w-4 h-4"></i> ルール設定</h3>
                
                <div class="flex items-center justify-between bg-slate-900 p-2.5 rounded-xl border border-slate-700">
                    <span class="text-xs font-bold text-slate-400">対戦形式</span>
                    <select id="lobby-game-type" onchange="updateRoomSettings()" class="bg-slate-800 text-amber-400 text-xs font-bold px-2 py-1 rounded outline-none border border-slate-700">
                        <option value="count">問題数 型（早解き）</option>
                        <option value="time">時間制限 型（スコア競争）</option>
                    </select>
                </div>
                <div class="flex items-center justify-between bg-slate-900 p-2.5 rounded-xl border border-slate-700" id="lobby-count-setting">
                    <span class="text-xs font-bold text-slate-400">出題する問題数 (問)</span>
                    <input type="number" id="lobby-max-q" value="10" min="5" max="50" onchange="updateRoomSettings()" class="bg-slate-800 text-amber-400 text-xs font-bold px-2 py-1 rounded outline-none border border-slate-700 w-16 text-center">
                </div>
                <div class="flex items-center justify-between bg-slate-900 p-2.5 rounded-xl border border-slate-700 hidden" id="lobby-time-setting">
                    <span class="text-xs font-bold text-slate-400">全体制限時間 (秒)</span>
                    <input type="number" id="lobby-total-time" value="120" min="30" max="600" onchange="updateRoomSettings()" class="bg-slate-800 text-amber-400 text-xs font-bold px-2 py-1 rounded outline-none border border-slate-700 w-16 text-center">
                </div>
                <div class="flex items-center justify-between bg-slate-900 p-2.5 rounded-xl border border-slate-700">
                    <span class="text-xs font-bold text-slate-400">1問の制限時間 (秒)</span>
                    <input type="number" id="lobby-q-time" value="30" min="5" max="60" onchange="updateRoomSettings()" class="bg-slate-800 text-amber-400 text-xs font-bold px-2 py-1 rounded outline-none border border-slate-700 w-16 text-center">
                </div>
                <div class="flex items-center justify-between bg-slate-900 p-2.5 rounded-xl border border-slate-700">
                    <span class="text-xs font-bold text-slate-400">出題範囲</span>
                    <select id="lobby-mode" onchange="updateRoomSettings()" class="bg-slate-800 text-amber-400 text-xs font-bold px-2 py-1 rounded outline-none border border-slate-700 w-32">
                        <option value="8">全範囲ランダム</option>
                        <option value="1">第一章（体の発達と特徴）</option>
                        <option value="2">第二章（運動機能と生理的機能）</option>
                        <option value="3">第三章（心と言葉・社会性）</option>
                        <option value="4">第四章（生活リズムと食事）</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center pt-4">
            <button onclick="leaveRoom()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-6 py-3 rounded-xl border border-slate-700 transition-all text-sm">
                退室する
            </button>
            <button id="lobby-start-btn" onclick="startMultiplayerGame()" class="hidden bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black px-8 py-3 rounded-xl shadow-lg transition-all text-sm">
                全員でゲーム開始！
            </button>
        </div>
    </div>

    <div id="play-screen" class="hidden space-y-4 relative z-10 fade-in">
        
        <div id="multi-scoreboard" class="hidden bg-slate-900/80 border border-emerald-500/30 p-2 rounded-xl overflow-x-auto custom-scrollbar flex gap-2 items-center mb-2">
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-stretch gap-2">
            <div class="bg-slate-850 px-4 py-3 rounded-2xl border border-slate-800 flex justify-between items-center flex-1">
                <div class="flex items-center gap-2">
                    <span id="quiz-mode-badge" class="text-xs font-black text-amber-400 bg-amber-400/10 px-2 py-1 rounded-lg border border-amber-500/20">モード</span>
                    <span id="global-timer-badge" class="hidden text-xs font-bold text-rose-400 bg-rose-400/10 px-2 py-1 rounded-lg flex items-center gap-1 border border-rose-500/30">
                        <i data-lucide="alarm-clock" class="w-3.5 h-3.5"></i> 残り <span id="global-timer-sec">0</span>秒
                    </span>
                    <button onclick="quitQuiz()" class="text-[10px] font-bold bg-rose-500/10 text-rose-400 hover:bg-rose-500/30 px-2 py-1 rounded-lg border border-rose-500/30 transition-all flex items-center gap-1 ml-1">
                        <i data-lucide="x-circle" class="w-3 h-3"></i>やめる
                    </button>
                </div>
                <span id="quiz-progress" class="text-xs text-slate-400 font-mono font-bold">1 / 10問目</span>
            </div>
            
            <div class="bg-gradient-to-r from-amber-600/20 to-orange-600/20 px-4 py-2 rounded-2xl border border-amber-500/30 flex justify-between items-center sm:min-w-[200px]">
                <div>
                    <span class="block text-[10px] text-amber-500/80 font-bold uppercase tracking-wider">SCORE</span>
                    <span id="score-display" class="text-xl font-black text-amber-400 font-mono">0<span class="text-sm">pt</span></span>
                </div>
                <div id="combo-display" class="text-sm font-black text-orange-400 opacity-50 transition-all">
                    0 Combo
                </div>
            </div>
        </div>

        <div id="timer-bar-container" class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
            <div id="timer-bar" class="h-full bg-amber-500 transition-all duration-100" style="width: 100%"></div>
        </div>

        <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-800/80 relative min-h-[100px] flex items-center">
            <span class="absolute -top-3 left-6 px-3 py-0.5 bg-slate-900 border border-slate-800 rounded-full text-[10px] font-bold text-slate-400">Question</span>
            <p id="quiz-question" class="text-base sm:text-lg font-bold leading-relaxed text-slate-100"></p>
        </div>

        <div class="space-y-3">
            <label class="block text-xs font-bold text-slate-400">あなたの解答 (平仮名も自動判定)：</label>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="user-answer" placeholder="解答を入力..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-amber-500 outline-none font-medium" autocomplete="off" onkeydown="handleEnterKey(event)">
                <button id="submit-btn" onclick="submitUserAnswer()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-8 py-3 rounded-xl transition-all shadow-lg whitespace-nowrap">
                    判定
                </button>
            </div>
        </div>

        <div id="feedback-panel" class="hidden p-4 rounded-2xl border transition-all fade-in">
            <div class="flex items-start gap-3">
                <span id="feedback-icon" class="text-2xl">⭕</span>
                <div class="space-y-1 w-full">
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <h3 id="feedback-title" class="font-extrabold text-lg">正解！</h3>
                            <span id="feedback-point" class="text-xs font-bold font-mono">+0pt</span>
                        </div>
                        <button id="override-btn" onclick="overrideAsCorrect()" class="text-[10px] font-bold bg-slate-850 hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-lg px-2 py-1 transition-all flex items-center gap-1 hidden">
                            <i data-lucide="check-square" class="w-3 h-3 text-amber-500"></i>正解にする
                        </button>
                    </div>
                    <p id="feedback-correct-answers" class="text-sm font-bold text-white"></p>
                    <p id="feedback-explanation" class="text-xs text-slate-300 pt-2 border-t border-white/10 mt-2"></p>
                </div>
            </div>
        </div>

        <div class="flex justify-end pt-2">
            <button id="next-btn" onclick="goToNextQuestion()" class="hidden w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-white font-bold px-8 py-3 rounded-xl border border-slate-700 flex items-center justify-center gap-2">
                <span id="next-btn-text">次の問題へ</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="result-screen" class="hidden text-center py-6 space-y-6 relative z-10 fade-in">
        <h2 class="text-2xl font-black text-slate-100 border-b border-slate-800 pb-2">最終結果発表</h2>
        
        <div id="result-multi-ranking" class="hidden max-w-md mx-auto space-y-2">
        </div>

        <div id="result-single-stats" class="max-w-sm mx-auto space-y-4">
            <div class="bg-gradient-to-r from-amber-600/20 to-orange-600/20 border border-amber-500/30 rounded-2xl p-6">
                <span class="block text-amber-500 text-xs font-bold mb-1">獲得トータルスコア</span>
                <span id="result-final-score" class="text-5xl font-black text-amber-400 font-mono drop-shadow-md">0</span>
                <span class="text-sm text-amber-500 font-bold ml-1">pt</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-3">
                    <span class="block text-slate-400 text-[10px] font-bold">正解数</span>
                    <span id="result-correct-count" class="text-xl font-black text-slate-200">0</span>
                </div>
                <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-3">
                    <span class="block text-slate-400 text-[10px] font-bold">最大コンボ</span>
                    <span id="result-max-combo" class="text-xl font-black text-orange-400">0</span>
                </div>
            </div>
        </div>

        <div class="pt-6 flex justify-center">
            <button onclick="leaveToMenu()" class="bg-slate-800 hover:bg-slate-700 text-white font-extrabold px-8 py-3 rounded-xl border border-slate-700 w-full sm:w-auto transition-all">
                メニューに戻る
            </button>
        </div>
    </div>
</div>

<script type="module">
    // --- Firebase Init ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyDicI5O04YZ-xKC65QdLspvBTcEc9CYlQ0",
        authDomain: "kanisns.firebaseapp.com",
        projectId: "kanisns"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'history-quiz-app';

    let myUid = "local_guest";
    
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                const cred = await signInWithCustomToken(auth, __initial_auth_token);
                myUid = cred.user.uid;
            } else {
                const cred = await signInAnonymously(auth);
                myUid = cred.user.uid;
            }
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            drawMenu();
        } catch (e) {
            console.error("Auth error", e);
            document.getElementById('loading-overlay').innerHTML = "<p class='text-rose-500 font-bold'>認証エラーが発生しました。</p>";
        }
    };
    initAuth();

    function getRoomsRef() {
        return collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
    }
    function getRoomDoc(roomId) {
        return doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
    }

    // --- 完全網羅問題データベース ---
    const quizDatabase = {1:[
{
"q": "約1歳から小学校入学前までの、人間として生きていくための基本的な力を身に付ける時期を何といいますか。",
"ans": "幼児期（または幼児）",
"exp": "乳児期から続く時期で、心身の発達が著しく、歩行や言葉の獲得など大きな変化が起こります。"
},
{
"q": "母体から離れて初めて外の新しい世界に触れ、自分の口から栄養をとり、外の環境に適応していく生後間もない時期を何といいますか。",
"ans": "新生児期（または新生児）",
"exp": "胎内環境からの劇的な変化に適応するための時期です。"
},
{
"q": "生まれたときの身長の平均はどれくらいですか。",
"ans": "約50cm（50cm程度）",
"exp": "個人差はありますが、この基準から1歳で約1.5倍、4歳で約2倍へと大きく成長します。"
},
{
"q": "生まれたときの体重の平均はどれくらいですか。",
"ans": "約3kg（3000g程度）",
"exp": "ここから1歳で約3倍（約9kg）、4歳で約5倍（約15kg）にまで増加します。"
},

        val = val.replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));

        playSound('click');
        const nameInput = document.getElementById('player-name-input').value.trim();
        myPlayerName = nameInput || "ゲスト";
        document.getElementById('player-name-display').textContent = myPlayerName;
        document.getElementById('player-name-display').classList.remove('hidden');

        isMultiplayer = false;
        activeIndex = 0; totalScore = 0; correctCount = 0; currentCombo = 0; maxCombo = 0;
        
        qTimerMax = parseInt(document.getElementById('single-timer-sec').value) || 30;
        const useTimer = document.getElementById('single-timer-toggle').checked;
        if(!useTimer) qTimerMax = 0;
        
        // ★修正点：出題数を読み込んで問題配列をカットする
        const qCount = parseInt(document.getElementById('single-q-count').value) || 10;

        let pool = [];
        if (mode === 8) {
            for(let m in quizDatabase) pool = pool.concat(quizDatabase[m]);
            activeQuestions = pool.sort(()=>Math.random()-0.5).slice(0, qCount);
            document.getElementById('quiz-mode-badge').textContent = "ランダム特訓";
        } else {
            pool = [...quizDatabase[mode]];
            activeQuestions = pool.sort(()=>Math.random()-0.5).slice(0, qCount);
            document.getElementById('quiz-mode-badge').textContent = `第${mode}章`;
        }
        
        // もし指定された出題数が用意された問題より多い場合、配列の長さに自動で調整されます
        document.getElementById('multi-scoreboard').classList.add('hidden');
        document.getElementById('global-timer-badge').classList.add('hidden');
        
        switchScreen('menu-screen', 'play-screen');
        loadQuestion();
    };

    // --- ★追加：途中でやめる機能 ---
    window.quitQuiz = function() {
        if(!confirm("本当にクイズを途中でやめますか？")) return;
        playSound('click');
        if(qTimerId) clearInterval(qTimerId);
        if(gTimerId) clearInterval(gTimerId);
        
        if(isMultiplayer) {
            leaveRoom("クイズをリタイアしました");
        } else {
            switchScreen('play-screen', 'menu-screen');
        }
    };

    // --- 2. マルチプレイ (部屋作成・参加) ---
    window.createRoom = async function() {
        playSound('click');
        const name = document.getElementById('player-name-input').value.trim();
        if(!name) return alert("名前を入力してください");
        myPlayerName = name;
        document.getElementById('player-name-display').textContent = myPlayerName;
        document.getElementById('player-name-display').classList.remove('hidden');

        const roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        try {
            await setDoc(getRoomDoc(roomId), {
                hostUid: myUid,
                status: 'waiting',
                settings: { gameType: 'count', maxQuestions: 10, totalTime: 180, timePerQ: 30, quizMode: "8" },
                players: { [myUid]: { name: myPlayerName, score: 0, combo: 0, progress: 0, isFinished: false } },
                questions: "[]",
                createdAt: serverTimestamp()
            });
            isHost = true;
            joinLobby(roomId);
        } catch(e) { console.error(e); alert("部屋の作成に失敗しました。"); }
    };

    window.joinRoom = async function() {
        playSound('click');
        const name = document.getElementById('player-name-input').value.trim();
        const rId = document.getElementById('join-room-id').value.trim().toUpperCase();
        if(!name || !rId) return alert("名前とルームIDを入力してください");
        myPlayerName = name;
        document.getElementById('player-name-display').textContent = myPlayerName;
        document.getElementById('player-name-display').classList.remove('hidden');

        try {
            const docSnap = await getDoc(getRoomDoc(rId));
            if(!docSnap.exists() || docSnap.data().status !== 'waiting') return alert("部屋が存在しないか、既に開始されています。");
            
            await updateDoc(getRoomDoc(rId), {
                [`players.${myUid}`]: { name: myPlayerName, score: 0, combo: 0, progress: 0, isFinished: false }
            });
            isHost = false;
            joinLobby(rId);
        } catch(e) { console.error(e); alert("参加に失敗しました。"); }
    };

    function joinLobby(roomId) {
        currentRoomId = roomId;
        document.getElementById('lobby-room-id').textContent = roomId;
        
        if(isHost) {
            document.getElementById('lobby-guest-overlay').classList.add('hidden');
            document.getElementById('lobby-start-btn').classList.remove('hidden');
        } else {
            document.getElementById('lobby-guest-overlay').classList.remove('hidden');
            document.getElementById('lobby-start-btn').classList.add('hidden');
        }

        switchScreen('menu-screen', 'lobby-screen');

        unsubscribeRoom = onSnapshot(getRoomDoc(roomId), (docSnap) => {
            if(!docSnap.exists()) return leaveRoom("部屋が解散されました");
            const data = docSnap.data();
            roomSettings = data.settings;
            roomPlayers = data.players || {};
            
            const listEl = document.getElementById('lobby-players-list');
            listEl.innerHTML = "";
            let pCount = 0;
            for(let uid in roomPlayers) {
                pCount++;
                const isMe = uid === myUid ? " (あなた)" : "";
                const isHostIcon = uid === data.hostUid ? `<i data-lucide="crown" class="w-3 h-3 text-amber-400"></i>` : "";
                listEl.innerHTML += `<li class="bg-slate-900 px-3 py-2 rounded-lg text-sm text-slate-300 font-bold border border-slate-700 flex items-center gap-2">${isHostIcon} ${escapeHTML(roomPlayers[uid].name)} <span class="text-emerald-500">${isMe}</span></li>`;
            }
            document.getElementById('lobby-player-count').textContent = pCount;
            lucide.createIcons();

            if(!isHost) {
                document.getElementById('lobby-game-type').value = roomSettings.gameType;
                document.getElementById('lobby-max-q').value = roomSettings.maxQuestions;
                document.getElementById('lobby-total-time').value = roomSettings.totalTime;
                document.getElementById('lobby-q-time').value = roomSettings.timePerQ;
                document.getElementById('lobby-mode').value = roomSettings.quizMode;
                toggleSettingFields();
            }

            if(data.status === 'playing' && document.getElementById('lobby-screen').classList.contains('hidden') === false) {
                activeQuestions = JSON.parse(data.questions);
                startMultiGame();
            }

            if(data.status === 'playing' || data.status === 'finished') {
                updateMultiScoreboard();
                checkIfAllFinished(data);
            }
        });
    }

    window.updateRoomSettings = function() {
        if(!isHost || !currentRoomId) return;
        toggleSettingFields();
        const settings = {
            gameType: document.getElementById('lobby-game-type').value,
            maxQuestions: parseInt(document.getElementById('lobby-max-q').value),
            totalTime: parseInt(document.getElementById('lobby-total-time').value),
            timePerQ: parseInt(document.getElementById('lobby-q-time').value),
            quizMode: document.getElementById('lobby-mode').value
        };
        updateDoc(getRoomDoc(currentRoomId), { settings: settings }).catch(e=>console.log(e));
    };

    function toggleSettingFields() {
        const type = document.getElementById('lobby-game-type').value;
        if(type === 'count') {
            document.getElementById('lobby-count-setting').classList.remove('hidden');
            document.getElementById('lobby-time-setting').classList.add('hidden');
        } else {
            document.getElementById('lobby-count-setting').classList.add('hidden');
            document.getElementById('lobby-time-setting').classList.remove('hidden');
        }
    }

    window.startMultiplayerGame = async function() {
        playSound('click');
        const m = roomSettings.quizMode;
        let pool = [];
        if(m === "8") { for(let k in quizDatabase) pool = pool.concat(quizDatabase[k]); } 
        else { pool = [...quizDatabase[m]]; }
        pool.sort(()=>Math.random()-0.5);
        
        const qCount = roomSettings.gameType === 'count' ? roomSettings.maxQuestions : 100;
        const selected = pool.slice(0, Math.min(qCount, pool.length));

        try {
            await updateDoc(getRoomDoc(currentRoomId), {
                questions: JSON.stringify(selected),
                status: 'playing'
            });
        } catch(e) { console.error(e); alert("開始エラー"); }
    };

    function startMultiGame() {
        isMultiplayer = true;
        activeIndex = 0; totalScore = 0; correctCount = 0; currentCombo = 0; maxCombo = 0;
        qTimerMax = roomSettings.timePerQ;
        
        document.getElementById('multi-scoreboard').classList.remove('hidden');
        document.getElementById('quiz-mode-badge').textContent = "オンライン対戦";

        if(roomSettings.gameType === 'time') {
            document.getElementById('global-timer-badge').classList.remove('hidden');
            gTimerMax = roomSettings.totalTime;
            gTimerVal = gTimerMax;
            startGlobalTimer();
        } else {
            document.getElementById('global-timer-badge').classList.add('hidden');
        }

        switchScreen('lobby-screen', 'play-screen');
        loadQuestion();
    }

    window.leaveRoom = function(msg) {
        if(unsubscribeRoom) unsubscribeRoom();
        if(msg) alert(msg);
        switchScreen('lobby-screen', 'menu-screen');
    };

    // --- 3. クイズ進行ロジック ---
    function loadQuestion() {
        if(qTimerId) clearInterval(qTimerId);
        document.getElementById('feedback-panel').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');
        
        const ansInput = document.getElementById('user-answer');
        ansInput.value = ""; ansInput.disabled = false; ansInput.focus();
        
        // ★修正点：X / Y 問目 の表記
        document.getElementById('quiz-progress').textContent = `${activeIndex + 1} / ${activeQuestions.length} 問目`;
        document.getElementById('quiz-question').textContent = activeQuestions[activeIndex].q;
        
        updateScoreUI();

        if (qTimerMax > 0) {
            document.getElementById('timer-bar-container').classList.remove('hidden');
            startQTimer();
        } else {
            document.getElementById('timer-bar-container').classList.add('hidden');
        }
    }

    function startQTimer() {
        qTimerVal = qTimerMax;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').className = "h-full bg-amber-500 transition-all";
        
        qTimerId = setInterval(() => {
            qTimerVal--;
            document.getElementById('timer-bar').style.width = `${(qTimerVal/qTimerMax)*100}%`;
            if (qTimerVal <= 0) { clearInterval(qTimerId); processAnswer(false, true); }
        }, 1000);
    }

    function startGlobalTimer() {
        document.getElementById('global-timer-sec').textContent = gTimerVal;
        gTimerId = setInterval(() => {
            gTimerVal--;
            document.getElementById('global-timer-sec').textContent = gTimerVal;
            if(gTimerVal <= 0) {
                clearInterval(gTimerId);
                finishMultiGameSelf();
            }
        }, 1000);
    }

    window.submitUserAnswer = function() {
        const userInput = document.getElementById('user-answer').value.trim();
        if (!userInput) return;
        if(qTimerId) clearInterval(qTimerId);
        
        const currentQ = activeQuestions[activeIndex];
        const isCorrect = currentQ.ans.some(a => hiraganize(userInput).includes(hiraganize(a)) || hiraganize(a).includes(hiraganize(userInput)));
        processAnswer(isCorrect, false);
    };

    function processAnswer(isCorrect, isTimeout) {
        const currentQ = activeQuestions[activeIndex];
        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
        const fp = document.getElementById('feedback-panel'); fp.classList.remove('hidden');
        
        let pointEarned = 0;
        if (isCorrect && !isTimeout) {
            playSound('correct'); 
            correctCount++; currentCombo++;
            if(currentCombo > maxCombo) maxCombo = currentCombo;
            
            const timeBonus = qTimerMax > 0 ? Math.floor((qTimerVal / qTimerMax) * 100) : 0;
            const comboBonus = currentCombo * 50;
            pointEarned = 100 + timeBonus + comboBonus;
            totalScore += pointEarned;

            fp.className = "p-4 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 text-emerald-300";
            document.getElementById('feedback-icon').textContent = "⭕";
            document.getElementById('feedback-title').textContent = "正解！";
            document.getElementById('feedback-point').textContent = `+${pointEarned}pt`;
            document.getElementById('feedback-point').className = "text-sm font-black font-mono text-emerald-400 combo-anim inline-block ml-2";
            document.getElementById('override-btn').classList.add('hidden');
        } else {
            playSound('incorrect');
            previousCombo = currentCombo; 
            currentCombo = 0; 
            fp.className = "p-4 rounded-2xl border border-rose-500/30 bg-rose-500/10 text-rose-300";
            document.getElementById('feedback-icon').textContent = isTimeout ? "⏰" : "❌";
            document.getElementById('feedback-title').textContent = isTimeout ? "時間切れ..." : "不正解...";
            document.getElementById('feedback-point').textContent = "";
            if(!isTimeout) document.getElementById('override-btn').classList.remove('hidden');
        }

        document.getElementById('feedback-correct-answers').innerHTML = `正解: <span class="text-white underline decoration-amber-400 font-bold">${currentQ.ans[0]}</span>`;
        document.getElementById('feedback-explanation').textContent = currentQ.exp || "";
        
        updateScoreUI();
        
        if(isMultiplayer) sendProgress();
        else document.getElementById('next-btn').focus();
    }

    function updateScoreUI() {
        document.getElementById('score-display').innerHTML = `${totalScore}<span class="text-sm">pt</span>`;
        const comboEl = document.getElementById('combo-display');
        if(currentCombo >= 2) {
            comboEl.textContent = `🔥 ${currentCombo} Combo!`;
            comboEl.classList.remove('opacity-50');
            comboEl.classList.add('combo-anim');
            setTimeout(()=>comboEl.classList.remove('combo-anim'), 300);
        } else {
            comboEl.textContent = "0 Combo";
            comboEl.classList.add('opacity-50');
        }
    }

    window.overrideAsCorrect = function() {
        playSound('correct'); 
        correctCount++; 
        currentCombo = previousCombo + 1; 
        if(currentCombo > maxCombo) maxCombo = currentCombo;
        const pointEarned = 100 + (currentCombo * 50); 
        totalScore += pointEarned;

        document.getElementById('feedback-panel').className = "p-4 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 text-emerald-300";
        document.getElementById('feedback-icon').textContent = "⭕";
        document.getElementById('feedback-title').textContent = "正解 (修正)";
        document.getElementById('feedback-point').textContent = `+${pointEarned}pt`;
        document.getElementById('feedback-point').className = "text-sm font-black font-mono text-emerald-400 combo-anim inline-block ml-2";
        document.getElementById('override-btn').classList.add('hidden');
        
        updateScoreUI();
        if(isMultiplayer) sendProgress();
    };

    window.goToNextQuestion = function() {
        playSound('click');
        activeIndex++;
        
        if(isMultiplayer) {
            if(roomSettings.gameType === 'count' && activeIndex >= activeQuestions.length) {
                finishMultiGameSelf();
            } else if (activeIndex >= activeQuestions.length) {
                finishMultiGameSelf();
            } else { loadQuestion(); }
        } else {
            if (activeIndex < activeQuestions.length) loadQuestion();
            else showResultSingle();
        }
    };

    // --- マルチプレイの同期と終了判定 ---
    function sendProgress() {
        if(!isMultiplayer || !currentRoomId) return;
        updateDoc(getRoomDoc(currentRoomId), {
            [`players.${myUid}.score`]: totalScore,
            [`players.${myUid}.combo`]: currentCombo,
            [`players.${myUid}.progress`]: activeIndex + 1
        }).catch(e=>console.log(e));
    }

    function updateMultiScoreboard() {
        const board = document.getElementById('multi-scoreboard');
        board.innerHTML = "";
        
        const sortedPlayers = Object.values(roomPlayers).sort((a,b) => b.score - a.score);
        sortedPlayers.forEach((p, idx) => {
            const isMe = p.name === myPlayerName ? "border-emerald-500 bg-emerald-900/40" : "border-slate-700 bg-slate-800";
            const comboText = p.combo >= 2 ? `<span class="text-[10px] text-orange-400 ml-1">🔥${p.combo}</span>` : "";
            const finishedText = p.isFinished ? `<span class="text-[10px] text-slate-400 ml-1">FIN</span>` : "";
            
            board.innerHTML += `
                <div class="px-3 py-1.5 rounded-lg border ${isMe} flex items-center gap-2 whitespace-nowrap">
                    <span class="text-xs font-bold text-slate-300">${idx+1}. ${escapeHTML(p.name)}</span>
                    <span class="text-xs font-black text-amber-400 font-mono">${p.score}pt</span>
                    ${comboText} ${finishedText}
                </div>
            `;
        });
    }

    function finishMultiGameSelf() {
        if(qTimerId) clearInterval(qTimerId);
        if(gTimerId) clearInterval(gTimerId);
        
        updateDoc(getRoomDoc(currentRoomId), {
            [`players.${myUid}.isFinished`]: true,
            [`players.${myUid}.score`]: totalScore 
        }).catch(e=>console.log(e));

        document.getElementById('quiz-question').textContent = "全員が終了するのを待っています...";
        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-panel').classList.add('hidden');
        document.getElementById('timer-bar-container').classList.add('hidden');
    }

    function checkIfAllFinished(data) {
        let allFin = true;
        for(let uid in data.players) {
            if(!data.players[uid].isFinished) allFin = false;
        }
        
        if(allFin && data.status !== 'finished') {
            if(isHost) {
                updateDoc(getRoomDoc(currentRoomId), { status: 'finished' });
            }
        }
        
        if(data.status === 'finished' && document.getElementById('result-screen').classList.contains('hidden')) {
            showResultMulti();
        }
    }

    // --- 結果表示 ---
    function showResultSingle() {
        document.getElementById('result-multi-ranking').classList.add('hidden');
        document.getElementById('result-single-stats').classList.remove('hidden');

        document.getElementById('result-final-score').textContent = totalScore;
        document.getElementById('result-correct-count').textContent = `${correctCount} / ${activeQuestions.length}`;
        document.getElementById('result-max-combo').textContent = maxCombo;

        switchScreen('play-screen', 'result-screen');
    }

    function showResultMulti() {
        if(qTimerId) clearInterval(qTimerId);
        if(gTimerId) clearInterval(gTimerId);
        
        document.getElementById('result-single-stats').classList.add('hidden');
        const rankingContainer = document.getElementById('result-multi-ranking');
        rankingContainer.classList.remove('hidden');
        rankingContainer.innerHTML = "";

        const sorted = Object.values(roomPlayers).sort((a,b) => b.score - a.score);
        
        sorted.forEach((p, idx) => {
            let medal = `<span class="w-6 h-6 rounded-full bg-slate-800 text-slate-400 font-bold flex items-center justify-center text-xs">${idx+1}</span>`;
            if(idx===0) medal = `<span class="w-6 h-6 rounded-full bg-amber-400 text-slate-900 font-bold flex items-center justify-center"><i data-lucide="medal" class="w-3.5 h-3.5"></i></span>`;
            
            const isMe = p.name === myPlayerName ? "bg-emerald-900/30 border-emerald-500/50" : "bg-slate-800/50 border-slate-700";
            
            rankingContainer.innerHTML += `
                <div class="flex justify-between items-center p-3 rounded-xl border ${isMe}">
                    <div class="flex items-center gap-3">
                        ${medal}
                        <span class="font-bold text-slate-200">${escapeHTML(p.name)}</span>
                    </div>
                    <span class="text-lg font-black text-amber-400 font-mono">${p.score} <span class="text-xs">pt</span></span>
                </div>
            `;
        });
        
        switchScreen('play-screen', 'result-screen');
        lucide.createIcons();
    }

    window.leaveToMenu = function() {
        playSound('click');
        if(unsubscribeRoom) unsubscribeRoom();
        currentRoomId = null; isHost = false;
        switchScreen('result-screen', 'menu-screen');
    };

    window.handleEnterKey = (e) => { 
        if(e.key==="Enter"){ 
            if(!document.getElementById('submit-btn').classList.contains('hidden')) {
                submitUserAnswer(); 
            }
        } 
    };

    function escapeHTML(str) { return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }
</script>

</body>
</html>
