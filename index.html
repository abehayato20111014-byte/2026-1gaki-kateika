<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼児発達クイズアプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --secondary: #F39C12;
            --danger: #E74C3C;
            --success: #2ECC71;
            --bg: #F4F7F6;
            --card-bg: #FFFFFF;
            --text: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--primary-dark);
        }

        .hidden {
            display: none !important;
        }

        /* Buttons */
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-secondary { background-color: var(--secondary); color: white; }

        /* Form Elements */
        .settings-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }
        select, input[type="number"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* Home Screen */
        .mistake-box {
            background: #FFF3E0;
            border-left: 5px solid var(--secondary);
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Quiz Screen */
        .header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .question-text {
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.5;
            background: #eaf2fb;
            padding: 20px;
            border-radius: 8px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background: #f1f1f1;
            color: var(--text);
            text-align: left;
            padding: 15px;
            font-size: 16px;
            border: 2px solid transparent;
        }
        .option-btn:hover { background: #e2e2e2; }
        .option-btn.correct { background: var(--success); color: white; }
        .option-btn.wrong { background: var(--danger); color: white; }

        /* Explanation Box */
        .explanation-box {
            margin-top: 20px;
            padding: 20px;
            background: #fdfaf6;
            border: 1px solid #eed3d7;
            border-radius: 8px;
        }
        .next-btn-container {
            margin-top: 20px;
            text-align: right;
        }

        /* Stats & Charts */
        .stats-section {
            margin-top: 40px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        .filter-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: #eee;
            color: #333;
            padding: 8px 15px;
            font-size: 14px;
        }
        .filter-btn.active {
            background: var(--primary-dark);
            color: white;
        }
        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>幼児発達クイズアプリ</h1>
        
        <div class="settings-group">
            <label for="time-limit">1問あたりの制限時間:</label>
            <select id="time-limit">
                <option value="0">制限なし</option>
                <option value="10">10秒</option>
                <option value="20" selected>20秒</option>
                <option value="30">30秒</option>
            </select>
        </div>

        <div class="settings-group">
            <label for="question-count">出題数 (全43問中):</label>
            <div>
                <input type="number" id="question-count" min="1" max="43" value="10">
                <button onclick="setAllQuestions()" class="btn-secondary" style="padding: 8px; font-size: 14px;">全問</button>
            </div>
        </div>

        <button class="btn-primary" style="width: 100%; font-size: 20px; padding: 15px;" onclick="startQuiz(false)">クイズをスタート</button>

        <div class="mistake-box">
            <div>
                <strong>間違えた問題の復習</strong>
                <p style="margin: 5px 0 0 0; font-size: 14px;">ストック: <span id="mistake-badge" class="badge">0</span> 問</p>
            </div>
            <button class="btn-danger" id="btn-mistake-start" onclick="startQuiz(true)">復習スタート</button>
        </div>

        <div class="stats-section">
            <h2>スコア推移とハイスコア</h2>
            <div class="filter-group">
                <button class="filter-btn active" onclick="updateStats('all', this)">全期間</button>
                <button class="filter-btn" onclick="updateStats('year', this)">今年</button>
                <button class="filter-btn" onclick="updateStats('month', this)">今月</button>
                <button class="filter-btn" onclick="updateStats('today', this)">今日</button>
            </div>
            <p style="text-align: center; font-weight: bold;">ハイスコア: <span id="high-score-display">0</span> 点</p>
            <canvas id="scoreChart"></canvas>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header-info">
            <span id="question-counter">問 1 / 10</span>
            <span id="timer-display" style="color: var(--danger);">時間: --</span>
        </div>
        <div class="header-info" style="font-size: 16px; color: #555;">
            <span>スコア: <span id="score-display">0</span></span>
            <span>コンボ: <span id="combo-display">0</span></span>
        </div>

        <div id="question-container" class="question-text">ここに問題が表示されます</div>
        
        <div id="options-container" class="options-grid">
            </div>

        <div id="explanation-container" class="explanation-box hidden">
            <h3 id="result-title"></h3>
            <p><strong>正解: </strong><span id="correct-answer-text"></span></p>
            <p><strong>解説: </strong><span id="explanation-text"></span></p>
            <div class="next-btn-container">
                <button class="btn-primary" onclick="nextQuestion()">次の問題へ</button>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <button class="btn-danger" onclick="quitQuiz()">中断してホームに戻る</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>結果発表！</h1>
        <div style="text-align: center; font-size: 24px; margin: 30px 0;">
            <p>最終スコア: <strong style="color: var(--primary); font-size: 36px;" id="final-score">0</strong> 点</p>
            <p>正解数: <span id="correct-count"></span> / <span id="total-count"></span> 問</p>
        </div>
        <button class="btn-primary" style="width: 100%; padding: 15px; font-size: 20px;" onclick="showHome()">ホームに戻る</button>
    </div>
</div>

<script>
    // --- Data ---
    const rawData = [
        { "q":"出生から4週間の間を何と呼びますか。", "ans":"新乳児期", "exp":"出生から4週間の間を指します。" },
        { "q":"出生から1歳になるまでを何と呼びますか。", "ans":"乳児期", "exp":"出生から1歳になるまでを指します。" },
        { "q":"1歳から小学校入学までの期間を何と呼びますか。", "ans":"幼児期", "exp":"1歳から小学校入学までを指します。" },
        { "q":"小学校入学から卒業までの期間を何と呼びますか。", "ans":"児童期", "exp":"小学校入学から卒業までを指します。" },
        { "q":"幼い頃の記憶を振り返る際、手がかりとして使えるものとして挙げられている2つの媒体は何ですか。", "ans":"写真、映像", "exp":"これらや、家族や自分にかかわってくれた人に話を聞くことが振り返りの手がかりになります。" },
        { "q":"幼い頃の思い出にはどのようなものがあるとされていますか。", "ans":"家族や友達のこと、保育所や幼稚園などでのこと、楽しかったこと、悲しかったことなど", "exp":"これら1つ1つの思い出や体験が、成長につながる大切な力になります。" },
        { "q":"幼児期は、どのような発達が目覚ましい時期とされていますか。", "ans":"心身の発達が目覚ましい時期", "exp":"体だけでなく、心の発達も大きく進む時期です。" },
        { "q":"子供の健やかな成長のために、大人は一人ひとりの何と何に気づく必要がありますか。", "ans":"個性、個人差", "exp":"一人ひとりの違いをその子らしさと受け止めて尊重します。" },
        { "q":"子供の成長には、どのような大人の存在が必要ですか。", "ans":"幼児が自ら育とうとする力を支える大人の存在", "exp":"発達の早い・遅いや得意・不得意を尊重し向き合うことが大切です。" },
        { "q":"幼児の体型にはどのような特徴があるため、バランスが取りにくくなりますか。", "ans":"腕や足が短く、身長に対して頭が大きい", "exp":"骨格が発達し身長が伸びますが、大人とは体型のバランスが異なります。" },
        { "q":"幼児の体型の特徴から、幼児期はどのような時期だと言えますか。", "ans":"転倒したり転落したりしやすい時期", "exp":"バランスが取りにくい体型であるため、ケガなどに注意が必要です。" },
        { "q":"幼児の体や運動機能の発達には、一定の決まりがあります。何と何があると言われていますか。", "ans":"方向と順序", "exp":"運動機能の発達には決まった順位や方向性があります。" },
        { "q":"運動機能の発達と好奇心はどのような関係にありますか。", "ans":"運動機能の発達によって行動範囲も広がり、好奇心が刺激され、その好奇心によって運動機能が刺激される", "exp":"行動と心理的な好奇心が互いに影響し合って発達します。" },
        { "q":"幼児の呼吸数や脈拍数は、成人と比べてどうなっていますか。", "ans":"幼児は成人と比べて、呼吸数、脈拍数が多くなっています", "exp":"体が小さくても、生理的機能の活動が活発です。" },
        { "q":"幼児が汗をかきやすいのはなぜですか。", "ans":"体温が高く、体温を調整する機能が未熟だから", "exp":"自分で体温をうまく調節できないため、十分な水分補給が必要です。" },
        { "q":"幼児が多くの睡眠時間を必要とするのは、何のためですか。", "ans":"疲れの回復や次の活動へのエネルギーを蓄えるため", "exp":"健やかな成長に十分な睡眠は欠かせません。" },
        { "q":"出生時の平均身長と平均体重はそれぞれ約どれくらいですか。", "ans":"身長約50cm、体重約3kg", "exp":"これが発育の基準となります。" },
        { "q":"4歳児の平均身長は約100cmです。これは、出生時の平均身長と比べて何倍ですか。", "ans":"2倍", "exp":"100cm ÷ 50cm = 2倍となります。" },
        { "q":"1歳児の平均体重は約9kgです。これは、出生時の平均体重と比べて何倍ですか。", "ans":"3倍", "exp":"9kg ÷ 3kg = 3倍となります。" },
        { "q":"4歳児の平均体重は約15kgです。これは、出生時の何倍ですか。", "ans":"5倍", "exp":"15kg ÷ 3kg = 5倍となります。" },
        { "q":"全身の運動機能は、「ハイハイする」の次からどのような順序で発達しますか。", "ans":"一人で歩く→走る、飛ぶ→スキップする", "exp":"段階を踏んで複雑な全身運動ができるようになります。" },
        { "q":"手先の運動機能は、「物をつかむ」の次からどのような道具を使う順番で発達しますか。", "ans":"クレヨンを使う→はさみを使う→鉛筆を使う", "exp":"指先の巧緻性が徐々に高まっていきます。" },
        { "q":"1歳の1分間あたりの「呼吸数」と「脈拍数」の目安をそれぞれ答えなさい。", "ans":"呼吸数：30～40/分、脈拍数：120～140/分", "exp":"年齢が低いほど呼吸数や脈拍数は多くなります。" },
        { "q":"4歳の1分間あたりの「呼吸数」と、3歳の「脈拍数」の目安を答えなさい。", "ans":"4歳の呼吸数：25～30/分、3歳の脈拍数：90～120/分", "exp":"成長とともに徐々に成人の数値に近づいていきます。" },
        { "q":"1歳と4歳の1日あたりの「睡眠時間」の目安をそれぞれ答えなさい。", "ans":"1歳：12～16時間、4歳：10～12時間", "exp":"成長に伴い必要な睡眠時間は少しずつ減っていきます。" },
        { "q":"幼児期に発達し、人として生きる力を獲得するための4つの要素は何ですか。", "ans":"言葉、認知、情緒、社会性", "exp":"これらが発達することで、人格形成の基礎を築きます。" },
        { "q":"のびのびとした心が育つために重要なものは何ですか。", "ans":"家族や身近な人への信頼感", "exp":"この信頼感が軸となり、その後の心の成長につながります。" },
        { "q":"幼児期に芽生え、身につく2つの「心」は何ですか。", "ans":"自立心、自律心", "exp":"これらが育ち、コミュニケーション力も向上します。" },
        { "q":"「自立」とはどのようなことですか。", "ans":"自分で服を脱ぎ着したり、排せつしたり、自分で判断して行動するなど、自分の力で生活できること", "exp":"生活面や行動面において、誰かの助けを借りずに自分でできることを指します。" },
        { "q":"「これが欲しい、こうしたいという欲求があっても、その場面に応じて自分の感情や行動をコントロールすること」を何と言いますか。", "ans":"自律", "exp":"自分の内面や感情を適切にコントロールする力のことを指します。" },
        { "q":"「認知」とはどのようなことですか。", "ans":"物の捉え方", "exp":"生後間もなく始まり、周囲の状況を見て適切な行動ができるようになります。" },
        { "q":"幼児期の「認知」の特徴として、どのような捉え方をすることがありますか。", "ans":"自分中心に物事をとらえたり、生命がないものにも自分と同じように命や意識があると考えること", "exp":"周囲も自分と同じように感じていると考えがちです。" },
        { "q":"「情緒」とは具体的にどのようなことですか。", "ans":"喜び、悲しみ、恐れ、怒り、心配、嫉妬、恥ずかしさなどのこと", "exp":"3〜4歳頃までに大人の持っている情緒がほぼ現れます。" },
        { "q":"「人に対して示すさまざまな反応や働きかけ」のことを何と言いますか。", "ans":"社会性", "exp":"愛情や信頼感をもとに、友達との遊びを通して身につけていきます。" },
        { "q":"社会性を身につける過程で、友達とのかかわりの中で経験する3つのことは何ですか。", "ans":"自己主張したり、我慢したり、人を思いやったりすること", "exp":"これらの経験を通して社会性が育まれます。" },
        { "q":"言葉の発達の順序について、「意味のある言葉（1語）を使う」の前段階にある、声に出して話そうとする状態を何と言いますか。", "ans":"喃語", "exp":"喃語→1語（ママなど）→2語文（ワンワンいるなど）→3～4語文の順に発達します。" },
        { "q":"2歳ごろから自我が芽生え、大人の手助けに「いや」と言い張ったりする時期を何と呼びますか。", "ans":"第一次反抗期", "exp":"この時期に気持ちを認められることで、基本的な信頼感や他者を思いやる気持ちが育ちます。" },
        { "q":"幼児の心身の健康の基本となる3つのことは何ですか。", "ans":"よく遊び、よく食べ、よく眠る", "exp":"幼児は遊びを中心とした1日をすごし、そこから様々なことを学んでいます。" },
        { "q":"1歳児と5歳児の睡眠時間や昼寝には、どのような違いがありますか。", "ans":"1歳児は睡眠時間が長く昼寝も必要だが、5歳児は体力がつくため昼寝が減り睡眠時間も短くなる", "exp":"年齢が上がり体力がつくにつれて、1日の生活リズムも変化します。" },
        { "q":"大人と幼児の胃袋の大きさは、それぞれおよそ何mlですか。", "ans":"大人：1500ml、幼児：50ml", "exp":"幼児の胃袋は非常に小さいため、一度にたくさんの量を食べることができません。" },
        { "q":"幼児が3回の食事以外にエネルギーや栄養を補うために食べるものを何と言いますか。", "ans":"間食", "exp":"おやつのことで、食事の一部として不足しがちな栄養素を補う役割があります。" },
        { "q":"間食を用意する際、栄養補給以外にどのような工夫をするとよいとされていますか。", "ans":"幼児が楽しめる工夫", "exp":"間食は幼児にとっての楽しみでもあるため、楽しい雰囲気や工夫を取り入れます。" },
        { "q":"幼児の食事は栄養補給以外に、社会性を身につけるためのどのような場でもありますか。（2つ解答）", "ans":"家族や友達と楽しく食べることを経験する場、食事のマナーを知ったりする場", "exp":"大人と一緒に楽しい雰囲気で食事をすることが、社会性やマナーの獲得につながります。" }
    ];

    // --- State ---
    let activeQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let combo = 0;
    let correctCount = 0;
    let isMistakeMode = false;
    
    // Timer state
    let timeLimit = 0; // in seconds
    let currentTimer = 0;
    let timerInterval = null;
    let questionStartTime = 0;

    // Chart instance
    let chartInstance = null;

    // --- Initialization ---
    window.onload = () => {
        document.getElementById('question-count').max = rawData.length;
        initHome();
    };

    function initHome() {
        // Load mistakes count
        const mistakes = getMistakes();
        document.getElementById('mistake-badge').innerText = mistakes.length;
        document.getElementById('btn-mistake-start').disabled = mistakes.length === 0;
        if(mistakes.length === 0) {
            document.getElementById('btn-mistake-start').style.opacity = '0.5';
            document.getElementById('btn-mistake-start').style.cursor = 'not-allowed';
        } else {
            document.getElementById('btn-mistake-start').style.opacity = '1';
            document.getElementById('btn-mistake-start').style.cursor = 'pointer';
        }

        // Render Chart and High Score
        updateStats('all', document.querySelector('.filter-btn.active'));
    }

    function setAllQuestions() {
        document.getElementById('question-count').value = rawData.length;
    }

    // --- Navigation ---
    function switchScreen(screenId) {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById(screenId).classList.remove('hidden');
    }

    function showHome() {
        clearInterval(timerInterval);
        initHome();
        switchScreen('home-screen');
    }

    function quitQuiz() {
        if(confirm("クイズを中断してホームに戻りますか？\n（ここまでのスコアは保存されません）")) {
            showHome();
        }
    }

    // --- Quiz Logic ---
    function startQuiz(mistakeMode) {
        isMistakeMode = mistakeMode;
        timeLimit = parseInt(document.getElementById('time-limit').value);
        let count = parseInt(document.getElementById('question-count').value);

        let targetPool = [];
        if (isMistakeMode) {
            const mistakes = getMistakes();
            targetPool = rawData.filter(q => mistakes.includes(q.q));
            count = targetPool.length; // Override count in mistake mode
        } else {
            targetPool = [...rawData];
        }

        // Shuffle and slice
        activeQuestions = targetPool.sort(() => Math.random() - 0.5).slice(0, count);
        
        currentIndex = 0;
        score = 0;
        combo = 0;
        correctCount = 0;
        
        updateScoreDisplay();
        switchScreen('quiz-screen');
        loadQuestion();
    }

    function loadQuestion() {
        const qData = activeQuestions[currentIndex];
        document.getElementById('question-counter').innerText = `問 ${currentIndex + 1} / ${activeQuestions.length}`;
        document.getElementById('question-container').innerText = qData.q;
        
        // Hide explanation
        document.getElementById('explanation-container').classList.add('hidden');
        document.getElementById('options-container').classList.remove('hidden');

        // Generate 4 options (1 correct, 3 random wrong)
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        let wrongOptions = rawData.filter(item => item.ans !== qData.ans)
                                  .sort(() => Math.random() - 0.5)
                                  .slice(0, 3)
                                  .map(item => item.ans);
        
        let allOptions = [qData.ans, ...wrongOptions].sort(() => Math.random() - 0.5);

        allOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(opt, qData.ans);
            optionsContainer.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        questionStartTime = Date.now();
        const display = document.getElementById('timer-display');
        
        if (timeLimit > 0) {
            currentTimer = timeLimit;
            display.innerText = `残り時間: ${currentTimer}秒`;
            
            timerInterval = setInterval(() => {
                currentTimer--;
                display.innerText = `残り時間: ${currentTimer}秒`;
                if (currentTimer <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(null, activeQuestions[currentIndex].ans); // Time out
                }
            }, 1000);
        } else {
            display.innerText = `時間: 制限なし`;
        }
    }

    function handleAnswer(selected, correct) {
        clearInterval(timerInterval);
        const elapsedSeconds = (Date.now() - questionStartTime) / 1000;
        const qData = activeQuestions[currentIndex];

        const isCorrect = (selected === correct);
        
        // UI Updates for options
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === correct) btn.classList.add('correct');
            else if (btn.innerText === selected) btn.classList.add('wrong');
        });

        const resultTitle = document.getElementById('result-title');
        
        if (isCorrect) {
            resultTitle.innerText = "⭕️ 正解！";
            resultTitle.style.color = "var(--success)";
            correctCount++;
            
            // Score Calculation
            // Base: 100
            // Combo Bonus: +50 per combo count
            // Time Bonus: Max 100 points, decays over 15 seconds.
            const baseScore = 100;
            const comboBonus = combo * 50;
            let timeBonus = 0;
            if (timeLimit > 0) {
                // If limit is 20s, answering in 2s gives more points than 18s.
                timeBonus = Math.max(0, Math.floor((timeLimit - elapsedSeconds) * (100 / timeLimit)));
            } else {
                // No limit time bonus (assume 15 seconds is the sweet spot)
                timeBonus = Math.max(0, Math.floor((15 - elapsedSeconds) * 5));
            }
            
            const earned = baseScore + comboBonus + timeBonus;
            score += earned;
            combo++;
            
            if(isMistakeMode) {
                removeMistake(qData.q);
            }
        } else {
            resultTitle.innerText = selected === null ? "⏰ 時間切れ..." : "❌ 不正解...";
            resultTitle.style.color = "var(--danger)";
            combo = 0;
            addMistake(qData.q);
        }

        updateScoreDisplay();

        // Show Explanation
        document.getElementById('correct-answer-text').innerText = qData.ans;
        document.getElementById('explanation-text').innerText = qData.exp;
        document.getElementById('explanation-container').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        saveScore(score);
        document.getElementById('final-score').innerText = score;
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('total-count').innerText = activeQuestions.length;
        switchScreen('result-screen');
    }

    function updateScoreDisplay() {
        document.getElementById('score-display').innerText = score;
        document.getElementById('combo-display').innerText = combo;
    }

    // --- Local Storage: Mistakes ---
    function getMistakes() {
        return JSON.parse(localStorage.getItem('quizMistakes') || '[]');
    }
    function addMistake(qString) {
        let m = getMistakes();
        if (!m.includes(qString)) {
            m.push(qString);
            localStorage.setItem('quizMistakes', JSON.stringify(m));
        }
    }
    function removeMistake(qString) {
        let m = getMistakes();
        m = m.filter(q => q !== qString);
        localStorage.setItem('quizMistakes', JSON.stringify(m));
    }

    // --- Local Storage: Scores ---
    function saveScore(newScore) {
        if(newScore === 0) return; // Don't save 0 points
        let scores = JSON.parse(localStorage.getItem('quizScores') || '[]');
        scores.push({ date: Date.now(), score: newScore });
        localStorage.setItem('quizScores', JSON.stringify(scores));
    }

    function getScores(filterType) {
        let scores = JSON.parse(localStorage.getItem('quizScores') || '[]');
        const now = new Date();
        let startTime = 0;

        if (filterType === 'today') {
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        } else if (filterType === 'month') {
            startTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
        } else if (filterType === 'year') {
            startTime = new Date(now.getFullYear(), 0, 1).getTime();
        }

        return scores.filter(s => s.date >= startTime).sort((a, b) => a.date - b.date);
    }

    // --- Chart & Stats ---
    function updateStats(filterType, btnElement) {
        // Update active button styling
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        const filteredScores = getScores(filterType);
        
        // Update High Score
        const maxScore = filteredScores.length > 0 ? Math.max(...filteredScores.map(s => s.score)) : 0;
        document.getElementById('high-score-display').innerText = maxScore;

        // Draw Chart
        const ctx = document.getElementById('scoreChart').getContext('2d');
        if (chartInstance) {
            chartInstance.destroy();
        }

        const labels = filteredScores.map((s, i) => {
            const d = new Date(s.date);
            return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
        });
        const dataPoints = filteredScores.map(s => s.score);

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'スコア',
                    data: dataPoints,
                    borderColor: '#4A90E2',
                    backgroundColor: 'rgba(74, 144, 226, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }
</script>
